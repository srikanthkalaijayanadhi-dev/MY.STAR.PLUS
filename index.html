<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta name="robots" content="index, follow">
    <title>My Star Plus — Stream Movies, Shows & Originals</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="HEARTBEAT is a personal demo OTT platform for streaming movies and series. Browse curated content in a premium cinematic experience.">
    <meta name="keywords" content="OTT, movies, series, streaming, HEARTBEAT, entertainment">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Link to the Vanilla CSS UI clone -->
    <link rel="stylesheet" href="vanilla-ui.css">
    
    <!-- Original Ad Preconnects -->
    <link rel="preconnect" href="https://pl29146922.profitablecpmratenetwork.com">
    <link rel="preconnect" href="https://pl29146923.profitablecpmratenetwork.com">
    <link rel="preconnect" href="https://pl29146924.profitablecpmratenetwork.com">
    <link rel="preconnect" href="https://www.highperformanceformat.com">
</head>
<body>

    <!-- Header Section -->
    <header>
        <button class="menu-btn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12h16M4 6h16M4 18h16"/></svg>
        </button>
        
        <div class="logo-container">
            <img src="https://i.ibb.co/8JWh91Z/Untitled-design.png" alt="My Star Plus Logo" style="height: 36px; object-fit: contain;">
        </div>

        <div class="header-actions">
            <button class="header-icon" id="search-trigger">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button class="header-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <div class="notification-badge">3</div>
            </button>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="search-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search movies, shows, genres...">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>
        </div>
    </div>

    <!-- Ad Slot: Home Top -->
    <div id="ad-home_top" class="mb-4 text-center"></div>

    <!-- Main Content Container where script.js will inject dynamic content -->
    <main id="content-container">
        <!-- Hero and Category sections will be injected here dynamically -->
    </main>

    <!-- Ad Slot: Home Bottom -->
    <div id="ad-home_bottom" class="mt-4 mb-20 text-center"></div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item mobile-nav-item active" id="mob-home">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="nav-label nav-text">Home</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
        <a href="#" class="nav-item mobile-nav-item" id="mob-movies">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
            <span class="nav-label nav-text">Movies</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
        <a href="#" class="nav-item mobile-nav-item" id="mob-series">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            <span class="nav-label nav-text">TV Shows</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
        <a href="#" class="nav-item mobile-nav-item" id="mob-mylist">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span class="nav-label nav-text">My List</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
        <a href="login.html" class="nav-item mobile-nav-item" id="mob-profile">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="nav-label nav-text">Profile</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
    </nav>

    <!-- Anti-Adblock Notice -->
    <div id="adblock-notice" class="adblock-notice hidden" style="position:fixed; z-index:9999; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center;">
        <div style="background:#1A1D24; padding:2rem; border-radius:12px; text-align:center; max-width:400px; border:1px solid rgba(255,255,255,0.1);">
            <div style="font-size:3rem;">🛡️</div>
            <h2 style="color:white; margin:1rem 0;">Ad-Blocker Detected</h2>
            <p style="color:#aaa; margin-bottom:1.5rem;">Our platform is free because of ads. Please disable your ad-blocker or whitelist HEARTBEAT to continue enjoying cinematic movies in HD.</p>
            <button class="bg-primary text-white rounded-xl px-4 py-2 font-semibold" onclick="location.reload()" style="background-color: var(--accent-red); border: none; padding: 10px 20px; border-radius: 8px; color: white;">I've Disabled It, Refresh</button>
            <button class="bg-white/10 text-white rounded-xl px-4 py-2 font-medium mt-2 block w-full" onclick="document.getElementById('adblock-notice').style.display='none'" style="background-color: rgba(255,255,255,0.1); border: none; padding: 10px 20px; border-radius: 8px; color: white; margin-top: 10px;">Maybe Later</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://pl29146924.profitablecpmratenetwork.com/60/cb/5f/60cb5f0889c1e330ca1d61468cf24463.js" async></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script src="ads.js"></script>
    <script>
        // Shared filter engine
        const navItems = document.querySelectorAll('.mobile-nav-item');
        const filterMap = {
            'mob-home': 'all',
            'mob-movies': 'Movie',
            'mob-series': 'Series',
            'mob-trending': 'Trending',
            'mob-profile': null
        };
        const mobMap = { all: 'mob-home', Movie: 'mob-movies', Series: 'mob-series', Trending: 'mob-trending' };

        function applyFilter(filter) {
            // Sync mobile active visually
            navItems.forEach(el => {
                el.classList.remove('active');
            });
            const mobEl = document.getElementById(mobMap[filter] || 'mob-home');
            if (mobEl) {
                mobEl.classList.add('active');
            }

            function doRender() {
                if (!window.app) { setTimeout(doRender, 100); return; }
                window.app.renderAll(filter);
                if (filter !== 'all') {
                    const contentEl = document.getElementById('content-container');
                    if (contentEl) contentEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
            doRender();
        }

        // Mobile bottom nav
        navItems.forEach(function (item) {
            item.addEventListener('click', function (e) {
                const filter = filterMap[this.id];
                if (filter === null) return; // profile link — let href work normally
                e.preventDefault();
                applyFilter(filter);
            });
        });

        // Search functionality
        const searchInput = document.getElementById('search-input');
        const searchIcon = document.getElementById('search-trigger');
        
        if (searchIcon && searchInput) {
            searchIcon.addEventListener('click', (e) => {
                e.preventDefault();
                searchInput.focus();
            });

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                if (query.length > 0) {
                    if (window.app) window.app.renderAll(`search:${query}`);
                } else {
                    applyFilter('all');
                }
            });
        }
    </script>
</body>
</html>
