    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('notificationsRead') !== 'true') {
                const dot = document.getElementById('nav-notif-dot');
                if (dot) dot.style.display = 'block';
            }
        });

        // Shared filter engine
        const navItems = document.querySelectorAll('.mobile-nav-item');
        const deskItems = document.querySelectorAll('.desktop-nav-item');
        const filterMap = {
            'mob-home': 'all', 'mob-movies': null, 'mob-series': null, 'mob-trending': 'Trending', 'mob-shopping': null, 'mob-search': null, 'mob-profile': null
        };
        const deskFilterMap = {
            'desk-home': 'all', 'desk-movies': null, 'desk-series': null, 'desk-mylist': 'all'
        };
        const mobMap = { all: 'mob-home', Movie: 'mob-movies', Series: 'mob-series', Trending: 'mob-trending' };
        const deskMap = { all: 'desk-home', Movie: 'desk-movies', Series: 'desk-series', Trending: 'desk-home' };

        function applyFilter(filter) {
            // Sync mobile active visually
            navItems.forEach(el => el.classList.remove('active'));
            const mobEl = document.getElementById(mobMap[filter] || 'mob-home');
            if (mobEl) mobEl.classList.add('active');

            // Sync desktop active visually
            deskItems.forEach(el => el.classList.remove('active'));
            const deskEl = document.getElementById(deskMap[filter] || 'desk-home');
            if (deskEl) deskEl.classList.add('active');

            function doRender() {
                if (!window.app) { setTimeout(doRender, 100); return; }
                window.app.renderAll(filter);
                if (filter !== 'all') {
                    const contentEl = document.getElementById('content-container');
                    if (contentEl) contentEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
            doRender();
        }

        // Mobile bottom nav
        navItems.forEach(function (item) {
            item.addEventListener('click', function (e) {
                const filter = filterMap[this.id];
                if (filter === null) return;
                e.preventDefault();
                applyFilter(filter);
            });
        });

        // Desktop top nav
        deskItems.forEach(function (item) {
            item.addEventListener('click', function (e) {
                const filter = deskFilterMap[this.id];
                if (filter === null) return;
                e.preventDefault();
                applyFilter(filter);
            });
        });

        // Search functionality
        const searchInput = document.getElementById('search-input');
        const searchIcon = document.getElementById('search-trigger');
        
        if (searchIcon && searchInput) {
            searchIcon.addEventListener('click', (e) => {
                e.preventDefault();
                searchInput.focus();
            });

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                if (query.length > 0) {
                    if (window.app) window.app.renderAll(`search:${query}`);
                } else {
                    applyFilter('all');
                }
            });
        }
    </script>
