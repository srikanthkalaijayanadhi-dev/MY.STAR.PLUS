    <style>
        :root {
            --bg-color: #0A0C10;
            --text-main: #FFFFFF;
            --text-muted: #9BA1A6;
            --accent-red: #E50914;
            --btn-grey: #1A1D24;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 90px;
        }

        /* Loading State */
        #loading {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* --- Shared Styles --- */
        .badge-grey { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .btn-primary { width: 100%; background: var(--accent-red); color: white; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .btn-secondary { flex: 1; background: var(--btn-grey); color: white; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }

        /* --- Movie UI Layout (KARA style) --- */
        .movie-hero { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .movie-poster { width: 320px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .movie-title { font-size: 32px; font-weight: 800; margin-top: 24px; text-align: center; }
        .movie-tags { display: flex; gap: 12px; margin-top: 10px; justify-content: center; align-items: center; }
        .movie-meta { display: flex; justify-content: space-between; background: var(--btn-grey); padding: 16px 20px; border-radius: 12px; width: 100%; max-width: 340px; margin-top: 20px; border: 1px solid var(--border-color); }
        .movie-actions { width: 100%; max-width: 340px; margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
        .movie-details { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .movie-synopsis { margin-top: 24px; font-size: 13px; color: #aaa; line-height: 1.6; max-width: 340px; text-align: center; }

        /* --- Series UI Layout (Spider-Noir style) --- */
        .series-hero { display: flex; gap: 16px; padding: 20px; align-items: flex-start; }
        .series-poster { width: 140px; border-radius: 12px; position: relative; flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .series-poster-img { width: 100%; border-radius: 12px; display: block; }
        .series-poster-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); cursor: pointer; }
        .series-details { flex: 1; display: flex; flex-direction: column; }
        .series-title { font-size: 26px; font-weight: bold; line-height: 1.2; margin-bottom: 8px; }
        .series-badges { display: flex; gap: 6px; margin-bottom: 8px; }
        .s-badge-red { background: var(--accent-red); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .s-badge-outline { border: 1px solid rgba(255,255,255,0.3); color: #ccc; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .series-genres { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .series-genres span { color: var(--accent-red); margin: 0 4px; }
        .series-ratings { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
        .series-synopsis { font-size: 12px; color: #999; line-height: 1.5; }
        .series-readmore { color: var(--accent-red); text-decoration: none; }

        /* Episodes Section */
        .episodes-section { padding: 20px; }
        .episodes-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .episodes-title { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; }
        .episodes-season { display: flex; align-items: center; gap: 4px; font-size: 14px; color: white; cursor: pointer; }
        
        .ep-card { display: flex; gap: 12px; padding: 10px; border-radius: 12px; margin-bottom: 12px; background: #0A0C10; border: 1px solid rgba(255,255,255,0.05); align-items: center; cursor: pointer; transition: all 0.2s; }
        .ep-card.active { border: 1px solid var(--accent-red); box-shadow: 0 0 12px rgba(229,9,20,0.2); }
        .ep-thumb { width: 110px; height: 65px; border-radius: 8px; position: relative; overflow: hidden; flex-shrink: 0; }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .ep-now-playing { position: absolute; top: 0; left: 0; background: var(--accent-red); color: white; font-size: 8px; font-weight: bold; padding: 2px 4px; border-radius: 0 0 4px 0; }
        .ep-play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
        .ep-details { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .ep-number { color: var(--accent-red); font-size: 10px; font-weight: bold; }
        .ep-title { font-size: 13px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .ep-desc { font-size: 10px; color: #888; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .ep-actions { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; height: 100%; gap: 10px; }
        .ep-play-btn { width: 28px; height: 28px; background: var(--accent-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .ep-duration { font-size: 10px; color: #888; margin-top: auto; }

        /* --- More Like This Section --- */
        .more-like-this { margin-top: 10px; }
        .section-header-mlt { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-bottom: 16px; }
        .section-title-mlt { display: flex; align-items: center; font-size: 16px; font-weight: 700; border-left: 3px solid var(--accent-red); padding-left: 8px; line-height: 1; }
        .view-all-mlt { color: var(--text-muted); font-size: 12px; text-decoration: none; }
        .mlt-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 20px; scroll-snap-type: x mandatory; }
        .mlt-scroll::-webkit-scrollbar { display: none; }
        .mlt-card { flex-shrink: 0; width: 110px; scroll-snap-align: start; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .mlt-card:active { transform: scale(0.95); }
        .mlt-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .mlt-rating { font-size: 11px; font-weight: bold; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 4px; color: white; }
        .mlt-rating span { color: var(--accent-red); }

        /* --- Bottom Navigation --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #050505; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; padding: 12px 10px 24px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #666; text-decoration: none; position: relative; transition: color 0.2s; }
        .nav-item.active { color: var(--accent-red); }
        .nav-icon { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }
        .nav-label { font-size: 10px; font-weight: 500; }
        .nav-indicator { width: 20px; height: 3px; background-color: var(--accent-red); border-radius: 2px; position: absolute; bottom: -8px; opacity: 0; transition: opacity 0.2s; }
        .nav-item.active .nav-indicator { opacity: 1; }

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Notification dot logic
            if (localStorage.getItem('notificationsRead') !== 'true') {
                const dot = document.getElementById('nav-notif-dot');
                if (dot) dot.style.display = 'block';
            }

            const urlParams = new URLSearchParams(window.location.search);
            const contentId = urlParams.get('id');

            if (!contentId || !supabase) {
                document.getElementById('loading').innerHTML = '<p>Content not found or database not initialized.</p><a href="index.html" style="color:var(--accent-red); margin-top:10px; display:block;">Go Home</a>';
                return;
            }

            // Fetch Main Content
            const { data: dbItem, error } = await supabase.from('content').select('*').eq('id', contentId).single();
            
            if (error || !dbItem) {
                document.getElementById('loading').innerHTML = '<p>Content not found.</p><a href="index.html" style="color:var(--accent-red); margin-top:10px; display:block;">Go Home</a>';
                return;
            }

            const item = {
                id: dbItem.id,
                title: dbItem.title,
                type: dbItem.type,
                thumbPortrait: dbItem.thumb_portrait,
                thumbLandscape: dbItem.thumb_landscape,
                category: dbItem.category,
                desc: dbItem.description,
                publishDate: dbItem.publish_date,
                featured: dbItem.featured,
                videoLink: dbItem.video_link,
                episodes: dbItem.episodes
            };

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dynamic-content').style.display = 'flex';
            document.getElementById('mlt-section').style.display = 'block';

            // Inject Immersive Background
            document.getElementById('hero-bg-immersive').style.backgroundImage = 'url(' + (item.thumbLandscape || item.thumbPortrait) + ')';

            if (item.type === 'Series') {
                renderSeriesUI(item);
            } else {
                renderMovieUI(item);
            }

            // Fetch Recommendations
            const { data: dbRecs } = await supabase.from('content').select('*').neq('id', contentId).limit(5);
            const recs = (dbRecs || []).map(r => ({
                id: r.id,
                title: r.title,
                thumbPortrait: r.thumb_portrait
            }));
            renderRecommendations(recs);
        });

        function renderSeriesUI(item) {
            const year = item.publishDate ? new Date(item.publishDate).getFullYear() : '2026';
            const genres = (item.category || 'Action').split(',').map(g => g.trim()).join(' <span>•</span> ');
            
            let episodes = [];
            try { episodes = typeof item.episodes === 'string' ? JSON.parse(item.episodes) : item.episodes; } catch(e) {}
            if(!episodes || episodes.length === 0) episodes = [];

            let epsHtml = '';
            episodes.forEach((ep, idx) => {
                const isActive = idx === 0;
                epsHtml += `
                    <div class="ep-card ${isActive ? 'active' : ''}" onclick="window.location.href='player.html?id=${item.id}&ep=${idx}'">
                        <div class="ep-thumb">
                            <img src="${item.thumbLandscape || item.thumbPortrait}" alt="Episode ${idx+1}">
                            ${isActive ? '<div class="ep-now-playing">Now Playing</div>' : ''}
                            <div class="ep-play-overlay">
                                ${isActive 
                                    ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
                                    : '<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>'}
                            </div>
                        </div>
                        <div class="ep-details">
                            <div class="ep-number">${idx+1}. EP${idx+1}</div>
                            <div class="ep-title">${ep.title || 'Episode '+(idx+1)}</div>
                            <div class="ep-desc">${ep.desc || 'No description available.'}</div>
                        </div>
                        <div class="ep-actions">
                            <div class="ep-play-btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                            <div class="ep-duration">${ep.duration || '45m'}</div>
                        </div>
                    </div>
                `;
            });

            const html = `
                <div class="series-hero">
                    <div class="series-poster">
                        <img src="${item.thumbPortrait}" class="series-poster-img">
                        <div class="series-poster-play" onclick="window.location.href='player.html?id=${item.id}${episodes.length > 0 ? '&ep=0' : ''}'">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </div>
                    </div>
                    <div class="series-details">
                        <h1 class="series-title">${item.title}</h1>
                        <div class="series-badges">
                            <span class="s-badge-red">${year}</span>
                            <span class="s-badge-outline">A</span>
                            <span class="s-badge-outline">18+</span>
                        </div>
                        <div class="series-genres">${genres}</div>
                        <div class="series-ratings">
                            <span style="color:#FFC107">⭐</span> 9.1/10 
                            <span style="color:#555">|</span> 
                            <span style="color:#E50914; font-weight:800; letter-spacing:-1px;">IMDb</span> 8.9
                        </div>
                        <p class="series-synopsis">${item.desc ? item.desc.substring(0, 110) + '...' : ''} <a href="#" class="series-readmore">... Read more</a></p>
                        <button class="btn-secondary" style="width:100%; margin-top:10px; padding: 8px; font-size:12px; font-weight:bold;" id="add-list-btn-${item.id}" onclick="addToList('${item.id}', '${item.title.replace(/'/g, "\\'")}', '${item.category || item.type}', '${item.thumbPortrait}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to List
                        </button>
                    </div>
                </div>

                ${episodes.length > 0 ? `
                <div class="episodes-section">
                    <div class="episodes-header">
                        <div class="episodes-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            Episodes
                        </div>
                        <div class="episodes-season">Season 1 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
                    </div>
                    <div>${epsHtml}</div>
                </div>` : ''}
            `;
            document.getElementById('dynamic-content').innerHTML = html;
            updateListBtnState(item.id, isItemInList(item.id));
        }

        function renderMovieUI(item) {
            const year = item.publishDate ? new Date(item.publishDate).getFullYear() : '2026';
            
            const html = `
                <div class="movie-hero">
                    <img src="${item.thumbPortrait}" class="movie-poster">
                    <div class="movie-details">
                        <h1 class="movie-title">${item.title}</h1>
                        <div class="movie-tags">
                            <span class="badge-grey">1080p Full HD</span>
                            <span style="color: #2196F3; font-size: 13px;">Published: June 5, ${year}</span>
                            <span class="badge-grey">${item.category || 'Action'}</span>
                        </div>
                        
                        <div class="movie-meta">
                            <div style="display:flex; flex-direction:column; align-items:center;">
                                <div style="font-size:14px; font-weight:bold;"><span style="color:#FFC107">⭐</span> 8.6/10</div>
                                <div style="font-size:11px; color:#888;">• IMDb</div>
                            </div>
                            <div style="display:flex; flex-direction:column; align-items:center;">
                                <div style="font-size:14px; font-weight:bold;">📅 ${year}</div>
                                <div style="font-size:11px; color:#888;">• Release Year</div>
                            </div>
                            <div style="display:flex; flex-direction:column; align-items:center;">
                                <div style="font-size:14px; font-weight:bold;">💬 U/A 16+</div>
                                <div style="font-size:11px; color:#888;">• Age Rating</div>
                            </div>
                        </div>

                        <div class="movie-actions">
                            <button class="btn-primary" onclick="window.location.href='player.html?id=${item.id}'">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Watch Now
                            </button>
                            <div style="display:flex; gap:12px; width: 100%;">
                                <button class="btn-secondary" id="add-list-btn-${item.id}" onclick="addToList('${item.id}', '${item.title.replace(/'/g, "\\'")}', '${item.category || item.type}', '${item.thumbPortrait}')">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to List
                                </button>
                                <button class="btn-secondary">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download
                                </button>
                            </div>
                        </div>

                        <p class="movie-synopsis">
                            ${item.desc || 'No description available.'} <a href="#" style="color:var(--accent-red); text-decoration:none;">... Read more</a>
                        </p>
                    </div>
                </div>
            `;
            document.getElementById('dynamic-content').innerHTML = html;
            updateListBtnState(item.id, isItemInList(item.id));
        }

        function renderRecommendations(items) {
            if(!items || items.length === 0) return;
            const container = document.getElementById('recommendations-scroll');
            let html = '';
            items.forEach(item => {
                html += `
                    <div class="mlt-card" onclick="window.location.href='watch.html?id=${item.id}'">
                        <img src="${item.thumbPortrait}" alt="${item.title}">
                        <div class="mlt-rating"><span>⭐</span> 8.${(item.id.charCodeAt(0) % 5) + 5}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.addToList = function(id, title, type, poster) {
            let myList = JSON.parse(localStorage.getItem('myList') || '[]');
            const exists = myList.find(i => String(i.id) === String(id));
            if (!exists) {
                myList.push({ id, title, type, poster });
                localStorage.setItem('myList', JSON.stringify(myList));
                updateListBtnState(id, true);
                window.dispatchEvent(new Event('myListUpdated'));
            } else {
                myList = myList.filter(i => String(i.id) !== String(id));
                localStorage.setItem('myList', JSON.stringify(myList));
                updateListBtnState(id, false);
                window.dispatchEvent(new Event('myListUpdated'));
            }
        };

        window.updateListBtnState = function(id, isAdded) {
            const btn = document.getElementById('add-list-btn-' + id);
            if(btn) {
                if(isAdded) {
                    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Added';
                    btn.style.color = 'var(--accent-red)';
                } else {
                    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to List';
                    btn.style.color = 'white';
                }
            }
        };

        window.isItemInList = function(id) {
            const myList = JSON.parse(localStorage.getItem('myList') || '[]');
            return myList.some(i => String(i.id) === String(id));
        };

        // Horizontal scroll script
        const slider = document.getElementById('recommendations-scroll');
        let isDown = false, startX, scrollLeft;
        slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            slider.scrollLeft = scrollLeft - ((e.pageX - slider.offsetLeft) - startX) * 2;
        });
    </script>
</body>
</html>
