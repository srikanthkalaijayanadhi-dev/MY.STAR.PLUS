<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movies - My Star Plus</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-red: #E50914;
            --text-main: #ffffff;
            --text-muted: #9ba1a6;
            --nav-bg: rgba(5, 5, 5, 0.95);
            --card-bg: #111;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        a { text-decoration: none; color: inherit; }

        /* Hide Scrollbars */
        ::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* 1. App Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { display: flex; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 18px; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        
        .icon-btn { background: none; border: none; color: white; display: flex; align-items: center; justify-content: center; padding: 4px; }
        .bell-container { position: relative; }
        .badge { position: absolute; top: 0; right: 2px; background: var(--accent-red); color: white; font-size: 10px; font-weight: bold; width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* 2. Page Title Section */
        .page-title-section {
            padding: 20px 20px 10px 20px;
        }
        .page-title {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .title-accent {
            width: 4px;
            height: 28px;
            background-color: var(--accent-red);
            border-radius: 2px;
        }
        .page-subtitle {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* 3. Search & Filters */
        .search-filter-row {
            display: flex;
            gap: 12px;
            padding: 10px 20px;
        }
        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background-color: #1a1c23;
            border-radius: 12px;
            padding: 12px 16px;
            gap: 10px;
            cursor: pointer;
        }
        .search-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            width: 100%;
            outline: none;
            cursor: pointer;
        }
        .search-input::placeholder { color: #666; }
        
        .filter-btn {
            background-color: #1a1c23;
            border: none;
            color: white;
            border-radius: 12px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        /* 4. Genre Pills */
        .genre-scroll {
            display: flex;
            gap: 12px;
            padding: 10px 20px 20px 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
        }
        .genre-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #1a1c23;
            padding: 10px 16px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid transparent;
            scroll-snap-align: start;
            cursor: pointer;
        }
        .genre-pill.active {
            border-color: var(--accent-red);
        }
        .genre-pill svg { width: 14px; height: 14px; }

        /* 5. Content Rows */
        .content-section {
            margin-bottom: 30px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px 15px 20px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
        }
        .view-all {
            color: var(--accent-red);
            font-size: 13px;
            display: flex;
            align-items: center;
        }
        
        .cards-scroll {
            display: flex;
            gap: 16px;
            padding: 0 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
        }
        
        .movie-card {
            min-width: 140px;
            width: 140px;
            scroll-snap-align: start;
            cursor: pointer;
        }
        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
            background-color: var(--card-bg);
        }
        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hd-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }
        .play-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            color: var(--text-muted);
            font-size: 11px;
            margin-bottom: 4px;
        }
        .card-rating {
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        
        /* Top Rated uses larger cards with no text below */
        .cards-scroll.large .movie-card {
            min-width: 160px;
            width: 160px;
        }
        .cards-scroll.large .poster-wrapper {
            margin-bottom: 0;
        }

        /* 6. Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(5,5,5,0.98);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px 0;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
        }
        .nav-item.active {
            color: var(--accent-red);
        }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; }
        .nav-item.active svg { stroke: var(--accent-red); }
        .nav-text { font-size: 10px; font-weight: 500; }
        
        /* Desktop nav */
        .desktop-nav {
            display: none;
        }
        
        @media (min-width: 1024px) {
            .bottom-nav { display: none !important; }
            body { padding-bottom: 0; }

            /* Show desktop nav */
            .desktop-nav {
                display: flex;
                gap: 32px;
                margin-left: 48px;
            }
            .desktop-nav a {
                color: var(--text-muted);
                text-decoration: none;
                font-size: 15px;
                font-weight: 500;
                transition: color 0.2s;
                padding: 4px 0;
                border-bottom: 2px solid transparent;
            }
            .desktop-nav a:hover {
                color: var(--text-main);
            }
            .desktop-nav a.active {
                color: var(--text-main);
                border-bottom-color: var(--accent-red);
            }

            /* Wider header on desktop */
            .header {
                padding: 20px 60px;
            }

            /* Wider content on desktop */
            .page-title-section {
                padding: 30px 60px 10px 60px;
            }
            .search-filter-row {
                padding: 10px 60px;
                max-width: 800px;
            }
            .genre-scroll {
                padding: 10px 60px 20px 60px;
            }
            .section-header {
                padding: 0 60px 15px 60px;
            }
            .cards-scroll {
                padding: 0 60px;
            }
        }
        
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Notification dot logic
            if (localStorage.getItem('notificationsRead') !== 'true') {
                const dot = document.getElementById('nav-notif-dot');
                if (dot) dot.style.display = 'block';
            }

            const container = document.getElementById('movies-content-container');
            
            if (!window.supabaseClient) {
                container.innerHTML = '<div style="color: #E50914; text-align: center; padding: 40px;">Database connection error.</div>';
                return;
            }

            // Fetch actual uploaded movies
            const { data, error } = await window.supabaseClient
                .from('content')
                .select('*')
                .eq('type', 'Movie')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = '<div style="color: #E50914; text-align: center; padding: 40px;">Error loading content.</div>';
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = '<div style="color: #888; text-align: center; padding: 40px;">No movies uploaded yet.</div>';
                return;
            }

            container.innerHTML = '';

            // Split data logically for the 3 rows
            // 1. New Releases (First 5 items by created_at)
            const newReleases = data.slice(0, 5);
            
            // 2. Trending Now (Next 5 items, or shuffle if not enough)
            const trendingNow = data.length > 5 ? data.slice(5, 10) : [...data].reverse();

            // 3. Top Rated (Sort by an arbitrary stable metric since rating doesn't exist, e.g., title length, or just another slice)
            const topRated = [...data].sort((a, b) => (b.title || '').length - (a.title || '').length).slice(0, 6);

            // Generate HTML for a Row
            function generateRow(title, iconHtml, items, isLarge = false) {
                if(items.length === 0) return '';
                
                let cardsHtml = '';
                items.forEach(item => {
                    // Random fixed rating based on ID for stability
                    const rating = (7.5 + ((item.id.charCodeAt(0) % 20) / 10)).toFixed(1); 
                    const year = item.publish_date ? new Date(item.publish_date).getFullYear() : '2026';
                    
                    cardsHtml += `
                    <div class="movie-card" onclick="window.location.href='watch.html?id=${item.id}'">
                        <div class="poster-wrapper">
                            <img src="${item.thumb_portrait}" alt="${item.title}" class="poster-img" loading="lazy" onerror="this.src='https://placehold.co/300x450/1a1a2e/ffffff?text=Poster+Not+Found'">
                            <div class="hd-badge">HD</div>
                            <div class="play-overlay">
                                <div class="play-circle">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                </div>
                            </div>
                        </div>
                        ${!isLarge ? `
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">${year} • ${item.category || 'Movie'}</div>
                        <div class="card-rating">⭐ ${rating}</div>
                        ` : ''}
                    </div>`;
                });

                return `
                <div class="content-section">
                    <div class="section-header">
                        <div class="section-title">
                            ${iconHtml}
                            ${title}
                        </div>
                        <a href="search.html" class="view-all">View all ></a>
                    </div>
                    <div class="cards-scroll hide-scroll ${isLarge ? 'large' : ''}">
                        ${cardsHtml}
                    </div>
                </div>`;
            }

            // Append Rows
            container.innerHTML += generateRow(
                'New Releases', 
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>',
