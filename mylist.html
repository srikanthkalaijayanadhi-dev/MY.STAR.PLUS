<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My List - My Star Plus</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-red: #E50914;
            --text-main: #ffffff;
            --text-muted: #9ba1a6;
            --nav-bg: rgba(5, 5, 5, 0.95);
            --card-bg: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }
        ::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* 1. App Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; position: sticky; top: 0; background: var(--nav-bg); backdrop-filter: blur(10px); z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { display: flex; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 18px; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .icon-btn { background: none; border: none; color: white; display: flex; align-items: center; justify-content: center; padding: 4px; cursor: pointer;}
        
        .bell-container { position: relative; }
        .notification-dot { display: none; width: 8px; height: 8px; background-color: var(--accent-red); border-radius: 50%; position: absolute; top: 0; right: 0; }

        /* 2. Page Title Section */
        .page-title-section { padding: 20px 20px 10px 20px; }
        .page-title { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 700; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .title-accent { width: 4px; height: 28px; background-color: var(--accent-red); border-radius: 2px; }
        .page-subtitle { color: var(--text-muted); font-size: 13px; }

        /* 5. Content Grid */
        .mylist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
            padding: 20px;
        }
        
        .movie-card {
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 8px;
            background-color: var(--card-bg);
        }
        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 4px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .remove-btn:hover { background: rgba(229, 9, 20, 0.8); }
        .card-title {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            color: var(--text-muted);
            font-size: 10px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 6. Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,5,0.98); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px 0 20px 0; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); }
        .nav-item.active { color: var(--accent-red); }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; }
        .nav-item.active svg { stroke: var(--accent-red); }
        .nav-text { font-size: 10px; font-weight: 500; }

        @media (min-width: 1024px) {
            .bottom-nav { display: none !important; }
            body { padding-bottom: 0; }
            .header { padding: 20px 60px; }
            .page-title-section { padding: 30px 60px 10px 60px; }
            .mylist-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding: 20px 60px; }
        }
    </style>
</head>
<body>

    <!-- 1. App Header -->
    <header class="header">
        <div class="header-left">
            <button class="icon-btn" onclick="window.location.href='index.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="header-logo">
                <a href="index.html"><img src="https://i.ibb.co/8JWh91Z/Untitled-design.png" alt="Star" style="height:24px;"></a>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="window.location.href='mylist.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button class="icon-btn bell-container" onclick="window.location.href='notifications.html'" style="position:relative;">
                <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <div class="notification-dot" id="nav-notif-dot"></div>
            </button>
        </div>
    </header>

    <!-- 2. Page Title Section -->
    <div class="page-title-section">
        <div class="page-title">
            <div class="title-accent"></div>
            My List
        </div>
        <div class="page-subtitle">Your saved movies and TV shows.</div>
    </div>

    <!-- 5. Content Rows -->
    <div id="mylist-content-container">
        <!-- JS will inject grid here -->
    </div>

    <!-- 6. Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="nav-text">Home</span>
        </a>
        <a href="movie.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
            <span class="nav-text">Movies</span>
        </a>
        <a href="tvshow.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            <span class="nav-text">TV Shows</span>
        </a>
        <a href="secret_pay.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="nav-text">Shopping</span>
        </a>
        <a href="search.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="nav-text">Search</span>
        </a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Notification dot logic
            if (localStorage.getItem('notificationsRead') !== 'true') {
                const dot = document.getElementById('nav-notif-dot');
                if (dot) dot.style.display = 'block';
            }

            renderMyList();

            // Listen for changes from other tabs to sync
            window.addEventListener('storage', (e) => {
                if (e.key === 'myList') {
                    renderMyList();
                }
            });
            // Listen for custom event from same tab
            window.addEventListener('myListUpdated', renderMyList);
        });

        function renderMyList() {
            const container = document.getElementById('mylist-content-container');
            const myList = JSON.parse(localStorage.getItem('myList') || '[]');

            if (myList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                        </svg>
                        <h3>Your List is Empty</h3>
                        <p style="margin-top:8px; font-size:12px;">Add movies and TV shows to your list so you can easily find them later.</p>
                    </div>
                `;
                return;
            }

            let cardsHtml = '';
            myList.forEach(item => {
                cardsHtml += `
                <div class="movie-card" onclick="window.location.href='watch.html?id=${item.id}'">
                    <div class="poster-wrapper">
                        <img src="${item.poster}" alt="${item.title}" class="poster-img" onerror="this.src='https://placehold.co/300x450/1a1a2e/ffffff?text=Poster+Not+Found'">
                        <div class="remove-btn" onclick="removeFromList(event, '${item.id}')">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </div>
                    </div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-meta">${item.type}</div>
                </div>`;
            });

            container.innerHTML = `
                <div class="mylist-grid">
                    ${cardsHtml}
                </div>
            `;
        }

        function removeFromList(event, id) {
            event.stopPropagation(); // Prevent navigating to watch.html
            let myList = JSON.parse(localStorage.getItem('myList') || '[]');
            myList = myList.filter(item => String(item.id) !== String(id));
            localStorage.setItem('myList', JSON.stringify(myList));
            window.dispatchEvent(new Event('myListUpdated'));
        }
    </script>
</body>
</html>
