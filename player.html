    <script>
        async function loadPlayer() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const ep = params.get('ep'); // Index if series episode

            // Setup back button
            if (id) {
                document.getElementById('back-link').href = `watch.html?id=${id}`;
            }

            if (!id) {
                document.getElementById('video-target').innerHTML = '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#e57373;">Invalid Link. Cannot load player.</div>';
                return;
            }

            // Fetch Content
            const { data, error } = await supabase
                .from('content')
                .select('*')
                .eq('id', id)
                .single();

            if (error || !data) {
                document.getElementById('video-target').innerHTML = '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#e57373;">Content not found in Database.</div>';
                return;
            }

            let embedCode = null;
            let displayTitle = data.title;

            // Determine if playing Movie or Episode
            if (ep !== null && data.episodes && data.episodes[ep]) {
                const epObj = data.episodes[ep];
                embedCode = epObj.embedCode;
                displayTitle = `${data.title} - ${epObj.title}`;
            } else {
                embedCode = data.embed_code;
            }

            // Set UI Titles
            document.getElementById('playing-title').textContent = displayTitle;
            document.title = 'Playing ' + displayTitle + ' | HEARTBEAT';

            // Inject iFrame safely
            if (embedCode && embedCode.trim() !== '') {
                document.getElementById('video-target').innerHTML = embedCode;
                // Force iframe to fill 100% of container
                const iframe = document.getElementById('video-target').querySelector('iframe');
                if (iframe) {
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    iframe.style.position = 'absolute';
                    iframe.style.top = '0';
                    iframe.style.left = '0';
                }
            } else {
                document.getElementById('video-target').innerHTML = '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#e57373;">No embedded video found for this title.</div>';
            }
            
            // Fetch Global Ads dynamically from DB
            const { data: adsData } = await supabase.from('ads').select('*').eq('is_active', true);
            if (adsData) {
                adsData.forEach(ad => {
                    // Try to place the ad if the slot exists on this player page
                    const slotEl = document.getElementById(`ad-${ad.slot_id}`);
                    if (slotEl && ad.code) {
                        slotEl.innerHTML = ad.code;
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', loadPlayer);
    </script>
