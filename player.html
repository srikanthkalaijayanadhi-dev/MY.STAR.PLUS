<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinematic Player | My Star Plus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0A0C10;
            --text-main: #FFFFFF;
            --text-muted: #9BA1A6;
            --accent-red: #E50914;
            --btn-grey: #1A1D24;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 20px;
        }

        .mobile-frame { min-height: 100vh; display: flex; flex-direction: column; }

        /* --- Header & Top Bar --- */
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 10px; font-size: 14px; font-weight: 600; z-index: 10; }
        .status-icons { display: flex; gap: 6px; align-items: center; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; margin-bottom: 10px; }
        .header-icon { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .desktop-nav { display: none; }
        
        .logo-container { display: flex; flex-direction: column; align-items: center; }
        .logo { display: flex; align-items: center; gap: 6px; font-size: 18px; font-weight: 700; font-style: italic; }
        .star-icon { color: #FF9D00; font-size: 22px; filter: drop-shadow(0 0 8px rgba(255, 157, 0, 0.8)); }
        .header-right { display: flex; gap: 16px; align-items: center; }

        /* --- Video Player Area --- */
        .player-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #video-target {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
        }
        #video-target video, #video-target iframe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
        }
        
        /* Custom Controls Overlay */
        .custom-controls {
            position: absolute;
            inset: 0;
            display: none; /* hidden by default, shown via JS if video element */
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
        }
        .controls-top {
            display: flex;
            justify-content: space-between;
            padding: 16px;
        }
        .controls-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        .play-pause-btn {
            width: 64px; height: 64px;
            border: 2px solid white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .play-pause-btn:active { transform: scale(0.95); }
        .skip-btn {
            background: none; border: none; color: white; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            font-size: 10px; font-weight: bold; position: relative;
        }
        .skip-btn svg { margin-bottom: -14px; }
        
        .controls-bottom {
            display: flex; align-items: center; padding: 12px 16px; gap: 12px;
        }
        .time-text { font-size: 12px; font-weight: 500; width: 40px; text-align: center; }
        
        /* Progress Bar */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: height 0.2s ease;
        }
        input[type=range]:hover {
            height: 8px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-red);
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        input[type=range]:hover::-webkit-slider-thumb {
            opacity: 1;
            transform: scale(1);
        }

        .dimmable-content {
            transition: opacity 0.5s ease;
        }

        /* --- Episode Metadata --- */
        .metadata-section { padding: 20px; }
        .subheading { color: var(--accent-red); font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ep-title { font-size: 26px; font-weight: 800; }
        .actions-row { display: flex; gap: 16px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: white; font-size: 10px; font-weight: 500; cursor: pointer; }
        
        .badges-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .badge { background: #111; border: 1px solid #333; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; color: #ddd; }
        
        .synopsis { font-size: 13px; color: #aaa; line-height: 1.5; margin-bottom: 20px; }
        .divider { width: 100%; height: 1px; background: var(--border-color); margin-bottom: 20px; }

        /* --- Next Episode Card --- */
        .next-ep-header { display: flex; align-items: center; font-size: 16px; font-weight: 700; border-left: 3px solid var(--accent-red); padding-left: 8px; margin-bottom: 16px; margin-left: 20px; line-height: 1; }
        
        .next-ep-card {
            display: flex; gap: 16px; align-items: center;
            margin: 0 20px 24px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .next-ep-thumb {
            width: 120px; height: 70px; border-radius: 8px;
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .next-ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .next-ep-play {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .next-ep-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .next-ep-sub { color: var(--accent-red); font-size: 10px; font-weight: bold; margin-bottom: 2px; }
        .next-ep-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .next-ep-desc { font-size: 11px; color: #888; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .next-ep-dur { font-size: 11px; color: #666; }
        .next-ep-arrow { color: #888; }

        /* --- Bottom Action Buttons --- */
        .bottom-actions {
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }
        .btn-action {
            width: 100%; padding: 16px; border-radius: 12px;
            font-size: 14px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            border: none; cursor: pointer; text-decoration: none; text-transform: uppercase;
        }
        .btn-red { background: var(--accent-red); color: white; }
        .btn-grey { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
    /* --- DESKTOP (PC) REDESIGN --- */
        @media (min-width: 1024px) {
            body { 
                display: block; 
                background-color: var(--bg-color); 
                padding: 0;
            }
            .mobile-frame {
                width: 100%; height: auto; background-color: transparent;
                border: none; border-radius: 0; overflow-y: visible;
                box-shadow: none;
            }
            .bottom-nav {
                display: none !important;
            }
            header {
                padding: 20px 80px;
                margin-bottom: 20px;
            }
            .logo-container {
                flex-direction: row;
                gap: 40px;
                align-items: center;
            }
            .desktop-nav {
                display: flex;
                gap: 32px;
                margin-left: 40px;
            }
            .desktop-nav a {
                color: rgba(255,255,255,0.7);
                text-decoration: none;
                font-size: 15px;
                font-weight: 500;
                transition: color 0.2s;
            }
            .desktop-nav a:hover, .desktop-nav a.active {
                color: white;
            }
            .header-icon#back-btn {
                display: none;
            }
            .video-container {
                max-width: 1200px;
                margin: 0 auto;
                border-radius: 16px;
                overflow: hidden;
                aspect-ratio: 16 / 9;
                height: auto;
            }
            .metadata-section {
                max-width: 1200px;
                margin: 40px auto;
                padding: 0 40px;
            }
            .title-row {
                margin-bottom: 24px;
            }
            .video-title {
                font-size: 32px;
            }
            .video-desc {
                font-size: 16px;
                line-height: 1.6;
            }
            .synopsis {
                font-size: 16px;
                max-width: 800px;
                line-height: 1.6;
            }
            .badges-row {
                margin-bottom: 24px;
            }
            .bottom-actions {
                position: static;
                flex-direction: row;
                justify-content: flex-start;
                padding: 20px 0;
                background: transparent;
                border: none;
                gap: 20px;
                width: 100%;
            }
            .bottom-actions .btn {
                flex: 0 1 auto;
                padding: 12px 30px;
            }
            .next-episode-card {
                margin: 0;
            }
        }

        
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const epIndexStr = urlParams.get('ep'); 
            
            if (id) {
                document.getElementById('back-btn').onclick = (e) => {
                    e.preventDefault();
                    window.location.href = `watch.html?id=${id}`;
                };
            }

            if (!id || !supabase) {
                document.getElementById('video-target').innerHTML = '<div style="color:#e57373; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">Content not found.</div>';
                return;
            }

            const { data, error } = await supabase.from('content').select('*').eq('id', id).single();
            if (error || !data) {
                document.getElementById('video-target').innerHTML = '<div style="color:#e57373; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">Content not found.</div>';
                return;
            }

            let embedCode = null;
            let downloadLink = null;
            let displayTitle = data.title;
            let subheading = data.type === 'Series' ? `${data.title.toUpperCase()}` : 'MOVIE';
            let description = data.description || 'No description available.';
            let isSeries = data.type === 'Series';

            let episodes = [];
            try { episodes = typeof data.episodes === 'string' ? JSON.parse(data.episodes) : data.episodes; } catch(e) {}
            if(!episodes) episodes = [];

            let currentEpIndex = null;

            if (isSeries && epIndexStr !== null && episodes[epIndexStr]) {
                currentEpIndex = parseInt(epIndexStr, 10);
                const epObj = episodes[currentEpIndex];
                embedCode = epObj.embedCode || epObj.link || epObj.videoUrl;
                displayTitle = epObj.title || `Episode ${currentEpIndex + 1}`;
                downloadLink = epObj.downloadLink;
                subheading = `${data.title.toUpperCase()} - S1 : E${currentEpIndex + 1}`;
                description = epObj.desc || description;

                // Setup Next Episode
                if (episodes[currentEpIndex + 1]) {
                    const nextObj = episodes[currentEpIndex + 1];
                    document.getElementById('next-ep-container').style.display = 'block';
                    document.getElementById('next-ep-sub').textContent = `S1 : E${currentEpIndex + 2}`;
                    document.getElementById('next-ep-title').textContent = nextObj.title || `Episode ${currentEpIndex + 2}`;
                    document.getElementById('next-ep-desc').textContent = nextObj.desc || 'Continue watching next episode.';
                    document.getElementById('next-ep-dur').textContent = nextObj.duration || '45m';
                    document.getElementById('next-ep-img').src = data.thumb_landscape || data.thumb_portrait;
                    
                    const nextUrl = `player.html?id=${id}&ep=${currentEpIndex + 1}`;
                    document.getElementById('next-ep-btn-card').onclick = () => window.location.href = nextUrl;
                    
                    const nextBtnBottom = document.getElementById('next-btn-bottom');
                    nextBtnBottom.style.display = 'flex';
                    nextBtnBottom.href = nextUrl;
                }
            } else {
                embedCode = data.embed_code || data.video_link;
                downloadLink = data.download_link;
            }

            // Populate Meta
            document.getElementById('dynamic-meta').style.display = 'flex';
            document.getElementById('meta-subheading').textContent = subheading;
            document.getElementById('meta-title').textContent = displayTitle;
            document.getElementById('meta-desc').textContent = description;
            
            const year = data.publish_date ? new Date(data.publish_date).getFullYear() : '2026';
            document.getElementById('meta-badges').innerHTML = `
                <div class="badge">${year}</div>
                <div class="badge">A</div>
                <div class="badge">18+</div>
                <div class="badge">HD</div>
                <div class="badge">5.1</div>
            `;

            if (downloadLink) {
                const dlBtn = document.getElementById('dl-btn');
                dlBtn.style.display = 'flex';
                dlBtn.href = downloadLink;
                dlBtn.target = '_blank';
            }

            // Inject Video / iFrame
            if (embedCode && embedCode.trim() !== '') {
                let finalEmbed = embedCode.trim();
                let isDirectVideo = false;

                if (!finalEmbed.startsWith('<')) {
                    if (finalEmbed.includes('youtube.com/watch?v=')) {
                        try {
                            const videoId = new URL(finalEmbed).searchParams.get('v');
                            if (videoId) finalEmbed = `https://www.youtube.com/embed/${videoId}`;
                        } catch(e) {}
                    } else if (finalEmbed.includes('youtu.be/')) {
                        const videoId = finalEmbed.split('youtu.be/')[1]?.split('?')[0];
                        if (videoId) finalEmbed = `https://www.youtube.com/embed/${videoId}`;
                    }
                    
                    if (finalEmbed.match(/\\.(mp4|webm|ogg|mkv)$/i) || finalEmbed.includes('.mp4')) {
                        isDirectVideo = true;
                        finalEmbed = `<video id="main-video" src="${finalEmbed}" playsinline autoplay style="width: 100%; height: 100%; object-fit: contain;"></video>`;
                    } else {
                        finalEmbed = `<iframe src="${finalEmbed}" allowfullscreen allow="autoplay; fullscreen" style="width: 100%; height: 100%; border: none;"></iframe>`;
                    }
                }

                document.getElementById('video-target').innerHTML = finalEmbed;

                if (isDirectVideo) {
                    setupCustomControls();
                } else {
                    document.getElementById('custom-controls').style.display = 'none';
                }
            } else {
                document.getElementById('video-target').innerHTML = '<div style="color:#e57373; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">No video available.</div>';
            }

            // Like Button Dummy
            const likeBtn = document.getElementById('like-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', () => {
                    const icon = document.getElementById('like-icon');
                    if (icon.getAttribute('fill') === 'none') {
                        icon.setAttribute('fill', 'currentColor');
                        likeBtn.style.color = 'var(--accent-red)';
                        icon.setAttribute('stroke', 'var(--accent-red)');
                    } else {
                        icon.setAttribute('fill', 'none');
                        likeBtn.style.color = 'white';
                        icon.setAttribute('stroke', 'currentColor');
                    }
                });
            }

            // Share Button
            const shareBtn = document.getElementById('share-btn');
            if (shareBtn) {
                shareBtn.addEventListener('click', () => {
                    if (navigator.share) {
                        navigator.share({
                            title: document.title,
                            url: window.location.href
                        }).catch(console.error);
                    } else {
                        navigator.clipboard.writeText(window.location.href);
                        const originalText = shareBtn.innerHTML;
                        shareBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied';
                        setTimeout(() => shareBtn.innerHTML = originalText, 2000);
                    }
                });
            }
        });

        function setupCustomControls() {
            const video = document.getElementById('main-video');
            const controls = document.getElementById('custom-controls');
            if (!video || !controls) return;

            controls.style.display = 'flex';
            
            const playPauseBtn = document.getElementById('play-pause-btn');
            const skipBackBtn = document.getElementById('skip-back-btn');
            const skipFwdBtn = document.getElementById('skip-fwd-btn');
            const progressBar = document.getElementById('progress-bar');
            const timeCurrent = document.getElementById('time-current');
            const timeTotal = document.getElementById('time-total');
            const fullscreenBtn = document.getElementById('fullscreen-btn');

            const formatTime = (seconds) => {
                if(isNaN(seconds)) return "0:00";
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m}:${s < 10 ? '0'+s : s}`;
            };

            video.addEventListener('loadedmetadata', () => {
                progressBar.max = video.duration;
                timeTotal.textContent = formatTime(video.duration);
            });

            video.addEventListener('timeupdate', () => {
                progressBar.value = video.currentTime;
                timeCurrent.textContent = formatTime(video.currentTime);
                const value = (progressBar.value / progressBar.max) * 100;
                progressBar.style.background = `linear-gradient(to right, var(--accent-red) ${value}%, #333 ${value}%)`;
            });

            const togglePlay = (e) => {
                if (window.isPlayerLocked) return;
                if (video.paused) {
                    video.play();
                    playPauseBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
                } else {
                    video.pause();
                    playPauseBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
                }
            };

            playPauseBtn.addEventListener('click', togglePlay);
            video.addEventListener('click', togglePlay);

            skipBackBtn.addEventListener('click', () => {
                if (window.isPlayerLocked) return;
                video.currentTime = Math.max(0, video.currentTime - 10);
            });
            skipFwdBtn.addEventListener('click', () => {
                if (window.isPlayerLocked) return;
                video.currentTime = Math.min(video.duration, video.currentTime + 10);
            });

            progressBar.addEventListener('input', () => {
                if (window.isPlayerLocked) return;
                video.currentTime = progressBar.value;
                const value = (progressBar.value / progressBar.max) * 100;
                progressBar.style.background = `linear-gradient(to right, var(--accent-red) ${value}%, #333 ${value}%)`;
            });

            fullscreenBtn.addEventListener('click', () => {
                if (window.isPlayerLocked) return;
                const container = document.getElementById('player-container');
                if (!document.fullscreenElement) {
                    if (container.requestFullscreen) container.requestFullscreen();
                    else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            });

            // Lock mode
            window.isPlayerLocked = false;
            const lockBtn = document.getElementById('lock-btn');
            const lockIcon = document.getElementById('lock-icon');
            const controlsCenter = document.getElementById('controls-center');
            const controlsBottom = document.getElementById('controls-bottom');
            const playerBackBtn = document.getElementById('player-back-btn');

            lockBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                window.isPlayerLocked = !window.isPlayerLocked;
                if (window.isPlayerLocked) {
                    lockIcon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
                    lockBtn.style.color = 'var(--accent-red)';
                    if (controlsCenter) controlsCenter.style.visibility = 'hidden';
                    if (controlsBottom) controlsBottom.style.visibility = 'hidden';
                    if (playerBackBtn) playerBackBtn.style.visibility = 'hidden';
                } else {
                    lockIcon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>';
                    lockBtn.style.color = 'white';
                    if (controlsCenter) controlsCenter.style.visibility = 'visible';
                    if (controlsBottom) controlsBottom.style.visibility = 'visible';
                    if (playerBackBtn) playerBackBtn.style.visibility = 'visible';
                }
            });

            // Auto-hide controls and dim background content when playing on desktop
            let timeout;
            const appHeader = document.getElementById('app-header');
            const metadataSection = document.getElementById('metadata-section');
            const nextEpContainer = document.getElementById('next-ep-container');
            const bottomActions = document.getElementById('bottom-actions');
            
            const resetTimer = () => {
                controls.style.opacity = '1';
                if (window.innerWidth >= 1024) {
                    if(appHeader) appHeader.style.opacity = '1';
                    if(metadataSection) metadataSection.style.opacity = '1';
                    if(nextEpContainer) nextEpContainer.style.opacity = '1';
                    if(bottomActions) bottomActions.style.opacity = '1';
                }
                clearTimeout(timeout);
                if (!video.paused) {
                    timeout = setTimeout(() => { 
                        controls.style.opacity = '0'; 
                        if (window.innerWidth >= 1024) {
                            if(appHeader) appHeader.style.opacity = '0.05';
                            if(metadataSection) metadataSection.style.opacity = '0.05';
                            if(nextEpContainer) nextEpContainer.style.opacity = '0.05';
                            if(bottomActions) bottomActions.style.opacity = '0.05';
                        }
                    }, 3500);
                }
            };

            video.addEventListener('mousemove', resetTimer);
            controls.addEventListener('mousemove', resetTimer);
            document.addEventListener('mousemove', resetTimer);
            video.addEventListener('play', resetTimer);
            video.addEventListener('pause', resetTimer);
            video.addEventListener('play', resetTimer);
            video.addEventListener('pause', () => { controls.style.opacity = '1'; clearTimeout(timeout); });
        }
    </script>
</body>
</html>
