    <script>
        async function loadPlayer() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const ep = params.get('ep'); // Index if series episode

            // Setup back button
            if (id) {
                document.getElementById('back-link').href = `watch.html?id=${id}`;
            }

            if (!id) {
                document.getElementById('video-target').innerHTML = '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#e57373;">Invalid Link. Cannot load player.</div>';
                return;
            }

            // Fetch Content
            const { data, error } = await supabase
                .from('content')
                .select('*')
                .eq('id', id)
                .single();

            if (error || !data) {
                document.getElementById('video-target').innerHTML = '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#e57373;">Content not found in Database.</div>';
                return;
            }

            let embedCode = null;
            let displayTitle = data.title;
            let downloadLink = null;

            // Determine if playing Movie or Episode
            if (ep !== null && data.episodes && data.episodes[ep]) {
                const currentEpIndex = parseInt(ep, 10);
                const epObj = data.episodes[currentEpIndex];
                embedCode = epObj.embedCode;
                displayTitle = `${data.title} - ${epObj.title}`;
                downloadLink = epObj.downloadLink;

                // Next Episode Button
                if (data.episodes[currentEpIndex + 1]) {
                    const nextBtn = document.getElementById('next-ep-btn');
                    if (nextBtn) {
                        nextBtn.style.display = 'inline-flex';
                        nextBtn.href = `player.html?id=${id}&ep=${currentEpIndex + 1}`;
                    }
                }

                // Prev Episode Button
                if (currentEpIndex > 0 && data.episodes[currentEpIndex - 1]) {
                    const prevBtn = document.getElementById('prev-ep-btn');
                    if (prevBtn) {
                        prevBtn.style.display = 'inline-flex';
                        prevBtn.href = `player.html?id=${id}&ep=${currentEpIndex - 1}`;
                    }
                }
            } else {
                embedCode = data.embed_code;
                downloadLink = data.download_link;
            }

            // Set UI Titles
            document.getElementById('playing-title').textContent = displayTitle;
            document.title = 'Playing ' + displayTitle + ' | HEARTBEAT';

            // Show Download Button
            const dlBtn = document.getElementById('player-download-btn');
            if (downloadLink && downloadLink.trim() !== '') {
                dlBtn.style.display = 'flex';
                dlBtn.onclick = (e) => {
                    e.preventDefault();
                    window.open(downloadLink, '_blank');
                };
            } else {
                dlBtn.style.display = 'none';
            }

            // Inject iFrame or Video safely
            if (embedCode && embedCode.trim() !== '') {
                let finalEmbed = embedCode.trim();
                
                // Check if the input is a direct URL (doesn't start with <)
                if (!finalEmbed.startsWith('<')) {
                    // Convert YouTube watch URLs to embed URLs
                    if (finalEmbed.includes('youtube.com/watch?v=')) {
                        try {
                            const videoId = new URL(finalEmbed).searchParams.get('v');
                            if (videoId) finalEmbed = `https://www.youtube.com/embed/${videoId}`;
                        } catch(e) {}
                    } else if (finalEmbed.includes('youtu.be/')) {
                        const videoId = finalEmbed.split('youtu.be/')[1]?.split('?')[0];
                        if (videoId) finalEmbed = `https://www.youtube.com/embed/${videoId}`;
                    }
                    
                    // Check if it's a raw video file
                    if (finalEmbed.match(/\.(mp4|webm|ogg|mkv)$/i)) {
                        finalEmbed = `<video controls autoplay style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: contain;"><source src="${finalEmbed}">Your browser does not support HTML5 video.</video>`;
                    } else {
                        // Standard iframe wrap
                        finalEmbed = `<iframe src="${finalEmbed}" allowfullscreen allow="autoplay; fullscreen" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none;"></iframe>`;
                    }
                }

                document.getElementById('video-target').innerHTML = finalEmbed;
                
                // Force iframe to fill 100% of container (for pasted iframes)
                const iframe = document.getElementById('video-target').querySelector('iframe');
                if (iframe) {
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    iframe.style.position = 'absolute';
                    iframe.style.top = '0';
                    iframe.style.left = '0';
                }
            } else {
                document.getElementById('video-target').innerHTML = '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#e57373;">No embedded video found for this title.</div>';
            }
            
            // Fetch Global Ads dynamically from DB
            const { data: adsData } = await supabase.from('ads').select('*').eq('is_active', true);
            if (adsData) {
                adsData.forEach(ad => {
                    // Try to place the ad if the slot exists on this player page
                    const slotEl = document.getElementById(`ad-${ad.slot_id}`);
                    if (slotEl && ad.code) {
                        slotEl.innerHTML = ad.code;
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', loadPlayer);
    </script>
