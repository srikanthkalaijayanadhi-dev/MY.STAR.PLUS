<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Star Plus - OTT Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0C10;
            --bg-card: #151821;
            --bg-search: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #9ba1a6;
            --accent-red: #ff0033;
            --accent-red-hover: #d60029;
            --badge-teal: #00d2d3;
            --nav-bg: rgba(10, 12, 16, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 80px; /* space for bottom nav */
        }

        /* Hide scrollbar for horizontal scroll areas */
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 1. Header Section */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
        }

        .dynamic-island {
            width: 120px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 8px;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            margin-top: 5px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
        }

        .star-icon {
            color: #ff9d00;
            font-size: 24px;
            filter: drop-shadow(0 0 8px rgba(255, 157, 0, 0.6));
        }

        .logo-underline {
            width: 100px;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg, #ff0000, #ff00ff, #00d2d3);
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .header-icon {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            position: relative;
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background-color: var(--accent-red);
            color: white;
            font-size: 10px;
            font-weight: bold;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 2. Search Bar */
        .search-container {
            padding: 10px 20px 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: var(--bg-search);
            border-radius: 30px;
            padding: 12px 16px;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* 3. Hero Section */
        .hero-container {
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .hero-card {
            position: relative;
            width: 100%;
            height: 380px;
            border-radius: 24px;
            overflow: hidden;
            background-color: #222;
        }

        .hero-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: right top;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(10, 12, 16, 0.95) 0%, rgba(10, 12, 16, 0.6) 40%, transparent 100%),
                        linear-gradient(to top, rgba(10, 12, 16, 0.9) 0%, transparent 50%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hero-top-badges {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .badge-featured {
            background-color: var(--accent-red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .badge-pagination {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        .hero-content {
            margin-bottom: 20px;
        }

        .hero-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .hero-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
            max-width: 80%;
            margin-bottom: 16px;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-play {
            background-color: var(--accent-red);
            color: white;
        }

        .btn-play:active {
            background-color: var(--accent-red-hover);
            transform: scale(0.98);
        }

        .btn-info {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-info:active {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }

        .hero-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: var(--accent-red);
            width: 16px;
            border-radius: 4px;
        }

        /* Common Section Styles */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 16px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
        }

        .section-title::before {
            content: '';
            display: block;
            width: 3px;
            height: 18px;
            background-color: var(--accent-red);
            border-radius: 4px;
        }

        .view-all {
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 4. Categories Section */
        .categories-section {
            margin-bottom: 30px;
        }

        .categories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 0 20px;
        }

        .category-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            scroll-snap-align: start;
        }

        .category-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .category-icon svg {
            width: 32px;
            height: 32px;
            stroke: white;
            stroke-width: 1.5;
            fill: none;
        }

        .category-name {
            font-size: 12px;
            font-weight: 500;
        }

        .cat-comedy { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .cat-action { background: linear-gradient(135deg, #f7971e, #ffd200); }
        .cat-drama { background: linear-gradient(135deg, #8a2387, #e94057, #f27121); }
        .cat-romance { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .cat-family { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .cat-more { background: linear-gradient(135deg, #141e30, #243b55); }

        /* 5. Trending Now Section */
        .trending-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 0 20px 20px;
        }

        .movie-card {
            flex-shrink: 0;
            width: 140px;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .poster-container {
            position: relative;
            width: 100%;
            height: 210px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .movie-card:hover .poster-img {
            transform: scale(1.05);
        }

        .badge-hd {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: var(--badge-teal);
            color: black;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .movie-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .movie-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .movie-rating {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .star-rating {
            color: #ffc107;
        }

        /* 6. Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 10px 24px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 500;
        }

        .nav-indicator {
            width: 20px;
            height: 3px;
            border-radius: 2px;
            background-color: transparent;
            margin-top: 2px;
            transition: background-color 0.2s ease;
        }

        .nav-item.active {
            color: var(--text-main);
        }

        .nav-item.active .nav-icon {
            stroke: var(--accent-red);
            fill: var(--accent-red);
            fill-opacity: 0.2;
        }

        .nav-item.active .nav-indicator {
            background-color: var(--accent-red);
        }
    </style>
</head>
<body>


    <header>
        <button class="menu-btn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12h16M4 6h16M4 18h16"/></svg>
        </button>
        
        <div class="logo-container">
            <img src="https://i.ibb.co/8JWh91Z/Untitled-design.png" alt="My Star Plus Logo" style="height: 36px; object-fit: contain;">
        </div>

        <div class="header-actions">
            <button class="header-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button class="header-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <div class="notification-badge">3</div>
            </button>
        </div>
    </header>

    <!-- 2. Search Bar -->
    <div class="search-container">
        <div class="search-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" class="search-input" placeholder="Search movies, shows, genres...">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>
        </div>
    </div>

    <!-- 3. Hero Section -->
    <section class="hero-container">
        <div class="hero-card">
            <!-- Using a high quality placeholder for the hero -->
            <img src="https://images.unsplash.com/photo-1503460295842-881c9a6f3b7b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Hero Background" class="hero-bg">
            <div class="hero-overlay">
                <div class="hero-top-badges">
                    <span class="badge-featured">FEATURED TODAY</span>
                    <span class="badge-pagination">1 / 5</span>
                </div>
                <div class="hero-content">
                    <h1 class="hero-title">Carmeni Selvam</h1>
                    <p class="hero-desc">A 2026 Tamil feel-good emotional drama that explores the impact of sudden financial greed on a simple, contented family.</p>
                    <div class="hero-actions">
                        <button class="btn btn-play" onclick="alert('Playing Carmeni Selvam')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            Play Now
                        </button>
                        <button class="btn btn-info">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            More Info
                        </button>
                    </div>
                </div>
                <div class="hero-dots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- 4. Categories Section -->
    <section class="categories-section">
        <div class="section-header">
            <h2 class="section-title">Categories</h2>
            <a href="#" class="view-all">View all <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></a>
        </div>
        <div class="categories-scroll hide-scroll">
            <div class="category-card">
                <div class="category-icon cat-comedy">
                    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8Z"/><path d="M8 9h.01M16 9h.01M8 14c1.33 2 4.67 2 8 0"/></svg>
                </div>
                <span class="category-name">Comedy</span>
            </div>
            <div class="category-card">
                <div class="category-icon cat-action">
                    <svg viewBox="0 0 24 24"><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.4-2.2 1.5-2.5l13.5-4c1.1-.3 2.2.4 2.5 1.5l.6 2.4z"/><path d="m9.6 4.7 1.9 5.3M14.6 3.2l1.9 5.3"/><path d="M2 13h20v8H2z"/></svg>
                </div>
                <span class="category-name">Action</span>
            </div>
            <div class="category-card">
                <div class="category-icon cat-drama">
                    <svg viewBox="0 0 24 24"><path d="M2 12a5 5 0 0 0 5 5h14a5 5 0 0 0-5-5H2z"/><path d="M6 12a5 5 0 0 1 5-5h14a5 5 0 0 1-5 5H6z"/></svg>
                </div>
                <span class="category-name">Drama</span>
            </div>
            <div class="category-card">
                <div class="category-icon cat-romance">
                    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </div>
                <span class="category-name">Romance</span>
            </div>
            <div class="category-card">
                <div class="category-icon cat-family">
                    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <span class="category-name">Family</span>

            <div class="category-card">

                </div>
                <span class="category-name">More</span>
            </div>
        </div>
    </section>

    <!-- 5. Trending Now Section -->
    <section>
        <div class="section-header">
            <h2 class="section-title">Trending Now</h2>
            <a href="#" class="view-all">View all <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></a>
        </div>
        <div class="trending-scroll hide-scroll" id="trending-container">
            <!-- Movie cards will be generated by JS -->
        </div>
    </section>

    <!-- 6. Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="setActiveNav(this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

            <div class="nav-indicator"></div>

        <a href="#" class="nav-item" onclick="setActiveNav(this)">

            <span class="nav-label">My List</span>
            <div class="nav-indicator"></div>

        <a href="#" class="nav-item" onclick="setActiveNav(this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="nav-label">Profile</span>
            <div class="nav-indicator"></div>
        </a>
    </nav>

    <script>
        // Sample Data for Trending Now Section
        const trendingMovies = [
            {
                title: "Carmeni Selvam",
                year: "2026",
                language: "Tamil",
                rating: "8.7",
                image: "https://images.unsplash.com/photo-1533106497176-45ae19e68ba2?w=400&h=600&fit=crop"
            },
            {
                title: "Spider-Noir",
                year: "2026",
                language: "English",
                rating: "9.1",
                image: "https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?w=400&h=600&fit=crop"
            },
            {
                title: "Kara",
                year: "2026",
                language: "Tamil",
                rating: "8.6",
                image: "https://images.unsplash.com/photo-1518599904199-0ca897819ddb?w=400&h=600&fit=crop"
            },
            {
                title: "Valiant",
                year: "2026",
                language: "Hindi",
                rating: "8.5",
                image: "https://images.unsplash.com/photo-1616091216791-a5360b5fc78a?w=400&h=600&fit=crop"
            }
        ];

        // Generate Trending Movie Cards
        const trendingContainer = document.getElementById('trending-container');
        
        trendingMovies.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = \`
                <div class="poster-container">
                    <img src="\${movie.image}" alt="\${movie.title}" class="poster-img">
                    <span class="badge-hd">HD</span>
                </div>
                <div class="movie-title">\${movie.title}</div>
                <div class="movie-meta">\${movie.year} • \${movie.language}</div>
                <div class="movie-rating">
                    <span class="star-rating">⭐</span> \${movie.rating}
                </div>
            \`;
            trendingContainer.appendChild(card);
        });

        // Bottom Navigation Active State Handler
        function setActiveNav(clickedItem) {
            // Remove active class from all items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            // Add active class to clicked item
            clickedItem.classList.add('active');
        }
    </script>
</body>
</html>
