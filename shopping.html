<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEARTBEAT | Affiliate Shopping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vanilla-ui.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <style>
        /* Shopping specific styles */
        .shop-hero {
            position: relative;
            width: 100%;
            height: 50vh;
            min-height: 400px;
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            margin-bottom: 2rem;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }
        .shop-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(11, 11, 15, 1) 0%, rgba(11, 11, 15, 0.4) 50%, transparent 100%);
        }
        .shop-hero-content {
            position: relative;
            z-index: 2;
            padding: 2rem;
            width: 100%;
        }
        .shop-hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .shop-hero-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin-bottom: 1.5rem;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            padding: 1rem 0;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .product-img-wrapper {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: #1a1a2e;
            position: relative;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-img {
            transform: scale(1.05);
        }
        .product-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e50914;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4caf50;
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .product-info {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }
        .product-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }
        .btn-buy {
            background: #e50914;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        .btn-buy:hover {
            background: #b20710;
        }
        
        .categories-pill-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .categories-pill-scroll::-webkit-scrollbar {
            display: none;
        }
        .cat-pill {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .cat-pill:hover, .cat-pill.active {
            background: #e50914;
        }

        .loading-state {
            text-align: center;
            padding: 4rem;
            color: rgba(255,255,255,0.5);
        }

        /* Modal specific styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            max-height: 90vh;
        }
        @media (min-width: 768px) {
            .modal-content {
                flex-direction: row;
            }
        }
        .modal-img-container {
            width: 100%;
            background: #0b0b0f;
        }
        @media (min-width: 768px) {
            .modal-img-container {
                width: 50%;
            }
        }
        .modal-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-height: 400px;
        }
        .modal-details {
            padding: 2rem;
            width: 100%;
            overflow-y: auto;
        }
        @media (min-width: 768px) {
            .modal-details {
                width: 50%;
            }
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <button class="menu-btn" onclick="document.getElementById('mobile-menu').classList.toggle('active')">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12h16M4 6h16M4 18h16"/></svg>
        </button>
        
        <div class="logo-container">
            <a href="index.html">
                <img src="https://i.ibb.co/8JWh91Z/Untitled-design.png" alt="HEARTBEAT" style="height: 36px; object-fit: contain;">
            </a>
            <div class="desktop-nav">
                <a href="index.html" class="desktop-nav-item">Home</a>
                <a href="movie.html" class="desktop-nav-item">Movies</a>
                <a href="tvshow.html" class="desktop-nav-item">TV Shows</a>
                <a href="shopping.html" class="desktop-nav-item active">Shopping</a>
            </div>
        </div>

        <div class="header-actions">
            <button class="header-icon" onclick="window.location.href='search.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Content Container -->
    <main id="shopping-container" style="padding: 80px 20px 100px 20px; max-width: 1400px; margin: 0 auto;">
        
        <div id="shop-content">
            <div class="loading-state">
                <h2>Loading Shop...</h2>
                <p>Bringing you the best deals.</p>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item mobile-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="nav-label nav-text">Home</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
        <a href="movie.html" class="nav-item mobile-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
            <span class="nav-label nav-text">Movies</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
        <a href="tvshow.html" class="nav-item mobile-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            <span class="nav-label nav-text">TV Shows</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
        <a href="shopping.html" class="nav-item mobile-nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="nav-label nav-text">Shopping</span>
            <div class="nav-indicator bg-transparent"></div>
        </a>
    </nav>

    <!-- Product Details Modal -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-img-container">
                <img src="" id="modal-img" class="modal-img" alt="Product Image">
            </div>
            <div class="modal-details">
                <span id="modal-category" style="color: #e50914; font-size: 0.8rem; font-weight: 600; text-transform: uppercase;"></span>
                <h2 id="modal-title" style="margin: 0.5rem 0; color: #fff;"></h2>
                <h3 id="modal-price" style="color: #fff; font-size: 1.5rem; margin: 0.5rem 0 1.5rem 0;"></h3>
                <p id="modal-desc" style="color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 2rem;"></p>
                <a href="#" id="modal-buy-btn" target="_blank" rel="noopener noreferrer" class="btn-buy" style="display: block; text-align: center; padding: 1rem; font-size: 1.1rem;">Buy Now</a>
            </div>
        </div>
    </div>

    <script>
        let allProducts = [];
        let currentFilter = 'All';

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchProducts();
        });

        async function fetchProducts() {
            if (!supabase) {
                document.getElementById('shop-content').innerHTML = '<div class="loading-state"><h2>Error</h2><p>Database connection not initialized.</p></div>';
                return;
            }

            const { data, error } = await supabase
                .from('products')
                .select('*')
                .eq('status', true)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error fetching products:", error);
                document.getElementById('shop-content').innerHTML = `<div class="loading-state"><h2>Error Loading Products</h2><p>${error.message}</p></div>`;
                return;
            }

            allProducts = data || [];
            renderShop();
        }

        function renderShop() {
            const container = document.getElementById('shop-content');
            
            if (allProducts.length === 0) {
                container.innerHTML = '<div class="loading-state"><h2>No Products Available</h2><p>Check back later for great deals!</p></div>';
                return;
            }

            // Extract unique categories
            const categories = ['All', ...new Set(allProducts.map(p => p.category).filter(c => c))];
            
            let filteredProducts = allProducts;
            if (currentFilter !== 'All') {
                filteredProducts = allProducts.filter(p => p.category === currentFilter);
            }

            const featuredProducts = allProducts.filter(p => p.featured);
            const heroProduct = featuredProducts.length > 0 ? featuredProducts[0] : allProducts[0];

            let html = '';

            // Hero Section (Only show if 'All' is selected)
            if (currentFilter === 'All' && heroProduct) {
                html += `
                <div class="shop-hero" style="background-image: url('${heroProduct.image_url || 'https://placehold.co/1200x600/1a1a2e/fff?text=No+Image'}')">
                    <div class="shop-hero-content">
                        ${heroProduct.featured ? '<span class="product-badge" style="position:static; display:inline-block; margin-bottom:10px;">Featured</span>' : ''}
                        <h1 class="shop-hero-title">${heroProduct.name}</h1>
                        <p class="shop-hero-desc">${heroProduct.description ? heroProduct.description.substring(0, 150) + '...' : ''}</p>
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            ${heroProduct.original_price ? `<del style="color: rgba(255,255,255,0.5); font-size: 1.2rem;">${heroProduct.original_price}</del>` : ''}
                            <span style="font-size: 1.5rem; font-weight: 700; color: #fff;">${heroProduct.price}</span>
                            <a href="${heroProduct.affiliate_url}" target="_blank" rel="noopener noreferrer" class="btn-buy">Shop Now</a>
                        </div>
                    </div>
                </div>`;
            }

            // Categories
            if (categories.length > 1) {
                html += `<div class="categories-pill-scroll">
                    ${categories.map(cat => `
                        <div class="cat-pill ${cat === currentFilter ? 'active' : ''}" onclick="setFilter('${cat}')">${cat}</div>
                    `).join('')}
                </div>`;
            }

            // Grid Title
            html += `<h2 style="font-size: 1.5rem; margin-bottom: 1rem; color: #fff;">${currentFilter === 'All' ? 'Latest Products' : currentFilter + ' Products'}</h2>`;

            // Products Grid
            if (filteredProducts.length === 0) {
                html += '<p style="color: rgba(255,255,255,0.5);">No products found in this category.</p>';
            } else {
                html += `<div class="product-grid">`;
                filteredProducts.forEach(product => {
                    const fallbackImg = 'https://placehold.co/300x300/1a1a2e/ffffff?text=No+Image';
                    html += `
                    <div class="product-card">
                        <div class="product-img-wrapper" onclick="openModal(${product.id})" style="cursor:pointer;">
                            <img src="${product.image_url || fallbackImg}" alt="${product.name}" class="product-img" loading="lazy" onerror="this.src='${fallbackImg}'">
                            ${product.featured ? '<span class="product-badge">Hot</span>' : ''}
                            ${product.discount_percentage ? `<span class="discount-badge">-${product.discount_percentage}%</span>` : ''}
                        </div>
                        <div class="product-info">
                            <h3 class="product-title" onclick="openModal(${product.id})" style="cursor:pointer;">${product.name}</h3>
                            <p class="product-desc">${product.description || ''}</p>
                            <div class="product-bottom">
                                <div style="display: flex; flex-direction: column;">
                                    ${product.original_price ? `<del style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">${product.original_price}</del>` : ''}
                                    <span class="product-price">${product.price}</span>
                                </div>
                                <a href="${product.affiliate_url}" target="_blank" rel="noopener noreferrer" class="btn-buy" onclick="event.stopPropagation();">Buy</a>
                            </div>
                        </div>
                    </div>`;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }

        function setFilter(cat) {
            currentFilter = cat;
            renderShop();
        }

        function openModal(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;

            document.getElementById('modal-img').src = product.image_url || 'https://placehold.co/600x600/1a1a2e/ffffff?text=No+Image';
            document.getElementById('modal-title').textContent = product.name;
            document.getElementById('modal-price').innerHTML = product.original_price ? 
                `<del style="color: rgba(255,255,255,0.5); font-size: 1rem; margin-right: 10px;">${product.original_price}</del>${product.price}` : 
                product.price;
            document.getElementById('modal-desc').textContent = product.description || '';
            document.getElementById('modal-category').textContent = product.category || 'General';
            document.getElementById('modal-buy-btn').href = product.affiliate_url;

            document.getElementById('product-modal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            document.getElementById('product-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal on outside click
        document.getElementById('product-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('product-modal')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
