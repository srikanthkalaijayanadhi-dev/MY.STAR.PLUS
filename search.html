<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search — My Star Plus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vanilla-ui.css">
    <style>
        /* Highly specific search page styles */
        body { background-color: #050505; }
        .adv-search-container { padding: 0 20px; max-width: 800px; margin: 0 auto; }
        
        .adv-search-box {
            display: flex; align-items: center; gap: 10px;
            background: #1a1a1a; border-radius: 30px;
            padding: 10px 16px; margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .adv-search-input {
            flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 14px;
        }
        .adv-clear-btn {
            background: transparent; border: none; cursor: pointer; display: flex; align-items: center;
        }
        .adv-filter-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
        .adv-filter-btn {
            background: transparent; border: none; cursor: pointer; color: white; display: flex; align-items: center;
        }

        .search-section { margin-bottom: 30px; }
        .section-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title-sm { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: white; }
        .clear-all-link { color: var(--accent-red); font-size: 12px; text-decoration: none; font-weight: 500; }

        .recent-pills-row { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .recent-pills-row::-webkit-scrollbar { display: none; }
        .recent-pill {
            background: #1a1a1a; padding: 6px 12px; border-radius: 20px; font-size: 12px; color: #ccc;
            display: flex; align-items: center; gap: 6px; white-space: nowrap; border: 1px solid rgba(255,255,255,0.05);
        }

        .top-searches-scroll { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; padding-bottom: 10px; }
        .top-searches-scroll::-webkit-scrollbar { display: none; }
        .top-search-card { width: 110px; flex-shrink: 0; display: flex; flex-direction: column; }
        .ts-poster { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; margin-bottom: 8px; }
        .ts-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .ts-meta { font-size: 10px; color: #888; margin-bottom: 4px; }
        .ts-rating { font-size: 11px; color: #ff9d00; display: flex; align-items: center; gap: 4px; }

        .genre-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .genre-btn {
            background: #1a1a1a; border-radius: 12px; padding: 12px 0;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; color: white; font-size: 11px; font-weight: 500;
        }
        .genre-btn svg { width: 24px; height: 24px; stroke-width: 1.5; }

        /* Specific Results Layout */
        .results-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 100px; }
        .result-item {
            display: flex; gap: 16px; background: #111; padding: 12px; border-radius: 16px;
            align-items: center; border: 1px solid rgba(255,255,255,0.02);
        }
        .res-poster { width: 70px; height: 100px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .res-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .res-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .res-meta { font-size: 11px; color: #888; margin-bottom: 2px; }
        
        .play-btn-circle {
            width: 36px; height: 36px; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-right: 8px;
        }
        .more-dots { color: #888; padding: 8px; cursor: pointer; }

        /* Desktop specific tweaks */
        @media (min-width: 1024px) {
            .genre-grid { grid-template-columns: repeat(8, 1fr); }
            .top-search-card { width: 140px; }
            .ts-poster { height: 210px; }
        }
        
        /* 5 Bottom Nav Search Active overrides */
        .bottom-nav { grid-template-columns: repeat(5, 1fr) !important; display: grid !important; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; }
        
        @media (min-width: 1024px) {
            .bottom-nav { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header style="padding: 15px 20px;">
        <button class="header-icon" onclick="history.back()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="logo-container" style="flex:1; display:flex; justify-content:center;">
            <img src="https://i.ibb.co/8JWh91Z/Untitled-design.png" alt="My Star Plus Logo" style="height: 36px; object-fit: contain;">
        </div>
        <div class="header-actions">
            <!-- Search icon is normally here, but we are ON the search page. Adding it as per prompt structure -->
            <button class="header-icon" style="opacity:0; pointer-events:none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button class="header-icon" onclick="window.location.href='notifications.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>

        </div>
    </header>

    <div class="adv-search-container">
        
        <!-- Main Search Input -->
        <div class="adv-search-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="adv-search-input" class="adv-search-input" placeholder="Search movies, shows, genres...">
            <button class="adv-clear-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <div class="adv-filter-divider"></div>

        </div>

        <!-- Recent Searches -->
        <div class="search-section">
            <div class="section-header-flex">
                <div class="section-title-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 
                    Recent Searches

        <!-- Top Searches -->

                </div>

                <!-- Dynamic top searches will be injected here -->

        </div>

        <!-- Browse by Genre -->
        <div class="search-section">
            <div class="section-header-flex">
                <div class="section-title-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>

                    <svg stroke="#8a2387" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>

                    <svg stroke="#ffd200" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                    Comedy
                </div>
                <div class="genre-btn" style="background: rgba(255,0,102,0.1); border-color: rgba(255,0,102,0.2);">
                    <svg stroke="#ff0066" fill="none" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    Romance
                </div>
                <div class="genre-btn" style="background: rgba(0,210,211,0.1); border-color: rgba(0,210,211,0.2);">
                    <svg stroke="#00d2d3" fill="none" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Thriller

                <div class="genre-btn" style="background: rgba(56,239,125,0.1); border-color: rgba(56,239,125,0.2);">
                    <svg stroke="#38ef7d" fill="none" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Family
                </div>
                <div class="genre-btn" style="background: rgba(255,0,51,0.1); border-color: rgba(255,0,51,0.2);">
                    <svg stroke="#ff0033" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5-2 4-2 4 2 4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                    Horror
                </div>
                <div class="genre-btn" style="background: rgba(0,198,255,0.1); border-color: rgba(0,198,255,0.2);">
                    <svg stroke="#00c6ff" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                    More
                </div>
            </div>
        </div>

        <!-- Results for 'Kara' -->
        <div class="search-section">
            <div class="section-header-flex">
                <div class="section-title-sm" style="font-size: 16px;" id="results-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Recent Uploads
                </div>
                <a href="#" class="clear-all-link">View all (12) ></a>
            </div>
            
            <div class="results-list" id="results-container">
                <!-- Dynamic results will be injected here -->
                <div style="color: #888; text-align: center; padding: 40px;">Type above to search your content...</div>

            <span style="font-size: 10px; color: #9ba1a6; margin-top:4px;">TV Shows</span>
        </a>

            <div style="position:absolute; top:-12px; width:30px; height:3px; background:var(--accent-red); border-radius:2px;"></div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="rgba(255,0,51,0.1)" stroke="var(--accent-red)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('adv-search-input');
            const resultsContainer = document.getElementById('results-container');
            const resultsHeader = document.getElementById('results-header');
            const clearBtn = document.querySelector('.adv-clear-btn');
            const recentContainer = document.getElementById('recent-searches-container');
            const topSearchesContainer = document.getElementById('top-searches-container');
            const clearRecentLink = document.querySelector('.clear-all-link');

            let debounceTimer;

            loadInitial();
            loadTopSearches();
            renderRecentSearches();

            // Genre click handling
            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const genre = btn.textContent.trim();
                    searchInput.value = genre;
                    searchInput.dispatchEvent(new Event('input'));
                });
            });

            // Handle typing in search
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                
                clearTimeout(debounceTimer);
                if (query.length === 0) {
                    document.querySelectorAll('.search-section').forEach(s => s.style.display = 'block');
                    loadInitial();
                    return;
                }
                
                // Hide other sections when searching
                document.querySelectorAll('.search-section').forEach(s => {
                    if(!s.contains(resultsContainer)) {
                        s.style.display = 'none';
                    }
                });

                // Show loading
                resultsHeader.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Searching for "${query}"...
                `;
                resultsContainer.innerHTML = '<div style="color: #888; text-align: center; padding: 40px;">Searching database...</div>';
                
                debounceTimer = setTimeout(() => {
                    performSearch(query);
                    saveRecentSearch(query);
                }, 800);
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                document.querySelectorAll('.search-section').forEach(s => s.style.display = 'block');
                loadInitial();
            });

            async function loadTopSearches() {
                if (!window.supabaseClient) return;
                const { data, error } = await window.supabaseClient
                    .from('content')
                    .select('*')
                    .order('created_at', { ascending: true })
                    .limit(4);

                if (error || !data) return;

                let html = '';
                data.forEach(item => {
                    const rating = (Math.random() * (9.5 - 7.0) + 7.0).toFixed(1);
                    const year = item.publish_date ? new Date(item.publish_date).getFullYear() : '2026';
                    html += `
                    <div class="top-search-card" onclick="window.location.href='watch.html?id=${item.id}'">
                        <img src="${item.thumb_portrait}" alt="${item.title}" class="ts-poster" onerror="this.src='https://placehold.co/300x450/1a1a2e/ffffff?text=Poster+Not+Found'">
                        <div class="ts-title">${item.title}</div>
                        <div class="ts-meta">${year} • ${item.category || 'Movies'}</div>
                        <div class="ts-rating">⭐ <span style="color:white;font-weight:bold;">${rating}</span></div>
                    </div>`;
                });
                if(html) topSearchesContainer.innerHTML = html;
            }

            function getRecentSearches() {
                return JSON.parse(localStorage.getItem('recentSearches') || '[]');
            }

            function saveRecentSearch(query) {
                if (!query) return;
                let searches = getRecentSearches();
                searches = searches.filter(s => s.toLowerCase() !== query.toLowerCase());
                searches.unshift(query);
                if (searches.length > 5) searches.pop();
                localStorage.setItem('recentSearches', JSON.stringify(searches));
                renderRecentSearches();
            }

            function renderRecentSearches() {
                const searches = getRecentSearches();
                if (searches.length === 0) {
                    recentContainer.innerHTML = '<div style="color: #888; font-size: 12px; margin-left: 20px;">No recent searches</div>';
                    return;
                }

                recentContainer.innerHTML = searches.map(s => `
                    <div class="recent-pill" onclick="window.triggerSearch('${s.replace(/'/g, "\\'")}')">
                        ${s} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </div>
                `).join('');
            }

            window.triggerSearch = function(query) {
                searchInput.value = query;
                searchInput.dispatchEvent(new Event('input'));
            }

            if(clearRecentLink) {
                clearRecentLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('recentSearches');
                    renderRecentSearches();
                });
            }

            async function loadInitial() {
                resultsHeader.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Recent Uploads
                `;
                
                if (!window.supabaseClient) {
                    resultsContainer.innerHTML = '<div style="color: #ff0033; text-align: center; padding: 40px;">Database connection error.</div>';
                    return;
                }

                // Fetch latest 5 items if no search term
                const { data, error } = await window.supabaseClient
                    .from('content')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                renderResults(data, error);
            }

            async function performSearch(query) {
                if (!window.supabaseClient) {
                    resultsContainer.innerHTML = '<div style="color: #ff0033; text-align: center; padding: 40px;">Database connection error.</div>';
                    return;
                }

                const { data, error } = await window.supabaseClient
                    .from('content')
                    .select('*')
                    .or(`title.ilike.%${query}%,category.ilike.%${query}%`)
                    .order('created_at', { ascending: false })
                    .limit(20);
                
                resultsHeader.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Results for "${query}"
                `;

                renderResults(data, error);
            }

            function renderResults(data, error) {
                if (error) {
                    console.error("Search error:", error);
                    resultsContainer.innerHTML = '<div style="color: #ff0033; text-align: center; padding: 40px;">Error performing search.</div>';
                    return;
                }

                if (!data || data.length === 0) {
                    resultsContainer.innerHTML = '<div style="color: #888; text-align: center; padding: 40px;">No matching titles found.</div>';
                    return;
                }

                let html = '';
                data.forEach(item => {
                    const type = item.type || 'Movie';
                    const metaStr = `${type} • ${item.category || 'Action'}`;
                    const releaseStr = `${item.publish_date ? new Date(item.publish_date).getFullYear() : '2026'} • English • ${type === 'Series' ? '1 Season' : '2h 10m'}`;
                    const rating = (Math.random() * (9.5 - 7.0) + 7.0).toFixed(1); // Demo rating if not exists

                    html += `
                    <div class="result-item" onclick="window.location.href='watch.html?id=${item.id}'">
                        <img src="${item.thumb_portrait}" alt="${item.title}" class="res-poster" onerror="this.src='https://placehold.co/300x450/1a1a2e/ffffff?text=Poster+Not+Found'">
                        <div class="res-details">
                            <div class="res-title">${item.title}</div>
                            <div class="res-meta">${metaStr}</div>
                            <div class="res-meta">${releaseStr}</div>
                            <div class="ts-rating" style="margin-top:2px;">⭐ <span style="color:white;font-weight:bold;">${rating}</span></div>
                        </div>
                        <div class="play-btn-circle">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="black"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </div>
                        <div class="more-dots">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                        </div>
                    </div>
                    `;
                });
                
                resultsContainer.innerHTML = html;
            }
        });
    </script>
</body>
</html>
